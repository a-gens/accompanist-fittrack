<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>FitTrack v2 — Your Weight Loss Tracker</title>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#0a0a0a;--card:#111;--card2:#161616;--brd:#ffffff08;
--t1:#e8e4df;--t2:#999;--t3:#555;--t4:#333;
--acc:#64ffda;--acc2:#64ffda20;--acc3:#64ffda40;
--red:#ff6b6b;--yel:#ffd93d;--pur:#a78bfa;--blu:#60a5fa;--grn:#66bb6a;--org:#ffa726;
--sab:env(safe-area-inset-bottom,0px);--sat:env(safe-area-inset-top,0px);
--font:'SF Pro Display','SF Pro Text',-apple-system,system-ui,sans-serif;
}
html{height:-webkit-fill-available;overscroll-behavior:none}
body{font-family:var(--font);background:var(--bg);color:var(--t1);line-height:1.5;min-height:100vh;min-height:-webkit-fill-available;overflow-x:hidden;-webkit-font-smoothing:antialiased}
#app{max-width:480px;margin:0 auto;padding-bottom:calc(72px + var(--sab))}

.hdr{padding:12px 20px 10px;padding-top:calc(12px + var(--sat));background:linear-gradient(180deg,#111,var(--bg));position:sticky;top:0;z-index:50}
.hdr-d{font-size:11px;color:var(--t3);letter-spacing:2px;text-transform:uppercase}
.hdr-t{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.3px;margin-top:1px}
.cnt{padding:0 16px}

/* nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(17,17,17,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--brd);display:flex;justify-content:space-around;padding:6px 0;padding-bottom:calc(6px + var(--sab));z-index:100}
.ni{text-align:center;cursor:pointer;padding:4px 6px;flex:1}.ni-i{font-size:18px;transition:.15s}.ni-l{font-size:8px;margin-top:1px;letter-spacing:.4px;transition:.15s}
.ni.on .ni-i{opacity:1}.ni:not(.on) .ni-i{filter:grayscale(1);opacity:.35}
.ni.on .ni-l{color:var(--acc);font-weight:600}.ni:not(.on) .ni-l{color:var(--t3)}

/* components */
.cd{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:16px;margin-bottom:12px}
.cd2{background:var(--card2);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.btn{font-family:var(--font);font-weight:600;border-radius:8px;cursor:pointer;border:1px solid var(--brd);background:#1a1a1a;color:#aaa;padding:8px 16px;font-size:13px;transition:.12s;display:inline-flex;align-items:center;justify-content:center}
.btn:active{transform:scale(.96)}.btn.ac{background:var(--acc2);color:var(--acc);border-color:var(--acc3)}
.btn.sm{padding:5px 10px;font-size:12px}.btn.fl{width:100%}.btn.dn{color:var(--red);border-color:#ff6b6b30}
.inp{width:100%;background:#080808;border:1px solid #ffffff10;border-radius:8px;padding:10px 12px;color:#fff;font-size:15px;font-family:var(--font);outline:none;-webkit-appearance:none}
.inp:focus{border-color:var(--acc3)}.inp::placeholder{color:#444}
.pb{width:100%;height:6px;background:#1a1a1a;border-radius:3px;overflow:hidden}.pb-f{height:100%;border-radius:3px;transition:width .5s ease}
.ib{border-radius:10px;padding:11px 14px;font-size:12px;margin-top:12px;line-height:1.5}
.ib.tip{background:#1a1812;color:#d4c8a0}.ib.ok{background:#121a18;color:#a0d4c4}.ib.wr{background:#1a1510;border-left:3px solid var(--yel);color:#d4c8a0}
.sl{font-size:11px;font-weight:600;color:var(--acc);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
.chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--t4);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--acc);flex-shrink:0;transition:.15s}
.chk.on{border-color:var(--acc)}
.tab{display:none}.tab.on{display:block}
.fade{animation:fi .25s ease}@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* date nav */
.dnav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px;padding:8px 0}
.dnav-btn{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--brd);color:var(--t2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--font)}
.dnav-btn:active{transform:scale(.9)}.dnav-btn.dis{opacity:.2;pointer-events:none}
.dnav-date{text-align:center}.dnav-day{font-size:15px;font-weight:600;color:#fff}.dnav-sub{font-size:11px;color:var(--t3)}
.today-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--acc);margin-left:6px;vertical-align:middle}

/* rings */
.rings{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.ring-c{background:var(--card);border-radius:12px;padding:10px 6px;text-align:center;border:1px solid var(--brd)}

/* notif banner */
.notif-banner{background:var(--acc2);border:1px solid var(--acc3);border-radius:12px;padding:14px 16px;margin-bottom:14px;cursor:pointer}
.notif-banner:active{transform:scale(.98)}

/* meal / exercise items */
.mi{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:12px 14px;margin-bottom:7px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:.12s}
.mi.lg{background:#64ffda08;border-color:#64ffda25}.mi:active{transform:scale(.98)}
.ei{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:13px 15px;margin-bottom:7px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:.12s}
.ei.dn{background:#64ffda06;border-color:#64ffda15;opacity:.55}.ei:active{transform:scale(.98)}

/* streak */
.streak-bar{display:flex;gap:3px;margin-top:8px}.streak-d{width:100%;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;color:#fff}

/* schedule */
.sch{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px}
.sch-c{background:var(--card);border-radius:6px;padding:6px 2px;text-align:center;border-bottom:2px solid transparent}
.sch-c .sd{color:#555;font-weight:500;text-transform:uppercase;letter-spacing:.3px;font-size:8px;margin-bottom:3px}
.sch-c .si{font-size:14px;margin-bottom:1px}.sch-c .sf{color:#555;font-size:7px;line-height:1.2}

/* weekly chart */
.wk-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.wk-label{width:32px;color:var(--t3);text-align:right;font-size:10px}
.wk-bar{flex:1;height:18px;background:#1a1a1a;border-radius:4px;position:relative;overflow:hidden}
.wk-fill{height:100%;border-radius:4px;transition:width .4s ease}
.wk-val{font-size:10px;color:var(--t2);width:40px;text-align:right}

@media(max-width:380px){.rings{gap:5px}.ring-c{padding:8px 4px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════ CONSTANTS ═══════════════════════
const TGT={cal:1400,pro:105,water:8,steps:7000};
const SW=66,GW=59;

const MEALS={
lunch:[
{name:"Grilled chicken + rice + salad",cal:500,pro:38,icon:"🍗"},
{name:"Eggs + lentils + veggies + bread",cal:480,pro:30,icon:"🥚"},
{name:"Salmon + sweet potato + broccoli",cal:520,pro:36,icon:"🐟"},
{name:"Tuna Greek salad + chickpeas",cal:490,pro:34,icon:"🥗"},
{name:"Turkey wrap + hummus + veggies",cal:470,pro:32,icon:"🌯"}
],snack:[
{name:"Greek yogurt + almonds",cal:240,pro:24,icon:"🥛"},
{name:"Protein shake + banana",cal:260,pro:28,icon:"🥤"},
{name:"2 boiled eggs + apple",cal:230,pro:14,icon:"🥚"},
{name:"Cottage cheese + berries",cal:220,pro:22,icon:"🫐"}
],dinner:[
{name:"Beef stir-fry + veggies + rice",cal:540,pro:40,icon:"🥩"},
{name:"White fish + roast veg + quinoa",cal:500,pro:38,icon:"🐟"},
{name:"Turkey lettuce wraps + avocado",cal:480,pro:42,icon:"🥬"},
{name:"Chicken thigh + roast cauliflower",cal:520,pro:40,icon:"🍗"},
{name:"Shrimp + zucchini noodles",cal:420,pro:36,icon:"🦐"}
]};

const WO={
A:{title:"Day A — Lower Body",burn:250,ex:[
{n:"Goblet Squats",s:"3×10-12"},{n:"Romanian Deadlifts",s:"3×10-12"},
{n:"Walking Lunges",s:"3×12/leg"},{n:"Hip Thrusts",s:"3×12-15"},
{n:"Push-ups",s:"3×8-12"},{n:"Plank Hold",s:"3×30-45s"}]},
B:{title:"Day B — Upper Body",burn:220,ex:[
{n:"DB Bench Press",s:"3×10-12"},{n:"Single-Arm Rows",s:"3×10-12/arm"},
{n:"Overhead Press",s:"3×10-12"},{n:"Lat Pulldown",s:"3×10-12"},
{n:"Bicep Curls",s:"2×12-15"},{n:"Tricep Dips",s:"2×12-15"},
{n:"Dead Bug",s:"3×10/side"}]},
C:{title:"Day C — Full Body + HIIT",burn:300,ex:[
{n:"Deadlifts",s:"3×10"},{n:"Bulgarian Split Squats",s:"3×10/leg"},
{n:"Incline Push-ups",s:"3×10-12"},{n:"Face Pulls",s:"3×15"},
{n:"Russian Twists",s:"3×15/side"},{n:"HIIT Sprints",s:"10 min"}]}
};

// ═══════════════════════ STORAGE ═══════════════════════
const P="ft2_";
function ld(k,f){try{const v=localStorage.getItem(P+k);return v?JSON.parse(v):f}catch{return f}}
function sv(k,v){try{localStorage.setItem(P+k,JSON.stringify(v))}catch(e){console.error(e)}}

function todayS(){return new Date().toISOString().slice(0,10)}
function dayN(d){return["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date(d+"T12:00:00").getDay()]}
function clamp(v,l,h){return Math.min(h,Math.max(l,v))}
function fmtDate(d){const dt=new Date(d+"T12:00:00");return dt.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}

function emptyDay(){return{meals:[],wo:null,cex:[],water:0,steps:0,note:""}}
function loadDay(d){return ld("d_"+d,null)||emptyDay()}
function saveDay(d,data){sv("d_"+d,data);const h=ld("hist",[]);if(!h.includes(d)){h.push(d);sv("hist",h)}}

// ═══════════════════════ STATE ═══════════════════════
let S={
tab:"home",vd:todayS(),
day:loadDay(todayS()),
wl:ld("wl",[]),
fs:ld("fs",null),
notifEnabled:ld("notif",false),
cmo:false,cn:"",cc:"",cp:"",wi:"",
};

function isToday(){return S.vd===todayS()}
function updDay(fn){S.day=fn(S.day);saveDay(S.vd,S.day);R()}

// ═══════════════════════ NOTIFICATIONS ═══════════════════════
function requestNotif(){
  if(!("Notification" in window)){alert("Your browser doesn't support notifications");return}
  Notification.requestPermission().then(p=>{
    S.notifEnabled=p==="granted";
    sv("notif",S.notifEnabled);
    if(S.notifEnabled){scheduleNotifs();alert("Notifications enabled! You'll get daily reminders.")}
    else alert("Notifications were denied. You can enable them in your browser settings.");
    R();
  });
}

let notifTimers=[];
function scheduleNotifs(){
  notifTimers.forEach(clearTimeout);notifTimers=[];
  if(!S.notifEnabled)return;
  const now=new Date();
  const reminders=[
    {h:8,m:0,msg:"☀️ Good morning! Fasting continues — water & black coffee only"},
    {h:12,m:0,msg:"🍽️ Eating window opens! Time for a protein-rich lunch (~500 kcal)"},
    {h:15,m:30,msg:"🥛 Snack time! Grab some Greek yogurt or a protein shake"},
    {h:17,m:30,msg:"💪 Gym time! Your workout is waiting — 45 mins, let's go"},
    {h:19,m:45,msg:"⏰ Eating window closes in 15 min! Last chance to eat"},
    {h:21,m:0,msg:"📊 Don't forget to log your meals, water & steps for today!"},
  ];
  reminders.forEach(r=>{
    const t=new Date();t.setHours(r.h,r.m,0,0);
    let ms=t-now;if(ms<0)ms+=86400000;
    const id=setTimeout(()=>{
      if(Notification.permission==="granted"){new Notification("FitTrack",{body:r.msg,icon:"💪"})}
      scheduleNotifs();
    },ms);
    notifTimers.push(id);
  });
}

// ═══════════════════════ STREAKS ═══════════════════════
function getStreak(){
  let streak=0;let d=new Date();
  while(true){
    const ds=d.toISOString().slice(0,10);
    const dd=ld("d_"+ds,null);
    if(dd&&(dd.meals.length>0||dd.wo||dd.water>0)){streak++;d.setDate(d.getDate()-1)}
    else break;
  }
  return streak;
}

function getLast7(){
  const days=[];const d=new Date();
  for(let i=6;i>=0;i--){
    const dt=new Date(d);dt.setDate(dt.getDate()-i);
    const ds=dt.toISOString().slice(0,10);
    const dd=ld("d_"+ds,null);
    days.push({date:ds,data:dd});
  }
  return days;
}

// ═══════════════════════ SVG RING ═══════════════════════
function ring(pct,col,sz,sw){
  const r=(sz-sw)/2,c=2*Math.PI*r,d=(clamp(pct,0,100)/100)*c;
  return`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="#1a1a1a" stroke-width="${sw}"/><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-dasharray="${d} ${c}" stroke-linecap="round" transform="rotate(-90 ${sz/2} ${sz/2})" style="transition:stroke-dasharray .5s"/></svg>`;
}

// ═══════════════════════ RENDER ═══════════════════════
function R(){
const d=S.day;
const tc=d.meals.reduce((s,m)=>s+m.cal,0);
const tp=d.meals.reduce((s,m)=>s+m.pro,0);
const cp=clamp(tc/TGT.cal*100,0,100),pp=clamp(tp/TGT.pro*100,0,100);
const wp=clamp((d.water||0)/TGT.water*100,0,100),sp=clamp((d.steps||0)/TGT.steps*100,0,100);

const now=Date.now();
const fe=S.fs?(now-S.fs)/36e5:0;
const fpct=S.fs?clamp(fe/16*100,0,100):0;
const fr=S.fs?Math.max(0,16-fe):0;
const fd=fpct>=100;

const streak=getStreak();
const last7=getLast7();
const dateObj=new Date();
const dateStr=dateObj.toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"});
const titles={home:"Today",meals:"Meals",gym:"Workout",fast:"Fasting",progress:"Progress",history:"History",plan:"Plan"};

let h=`<div class="hdr"><div class="hdr-d">${dateStr}</div><div class="hdr-t">${titles[S.tab]}${S.tab==="home"&&streak>=2?` <span style="font-size:14px;color:var(--org)">🔥${streak} day streak</span>`:""}</div></div><div class="cnt">`;

// ════════════════════ HOME ════════════════════
h+=`<div class="tab ${S.tab==="home"?"on":""} fade">`;

// notification prompt
if(!S.notifEnabled&&"Notification" in window){
  h+=`<div class="notif-banner" onclick="requestNotif()"><div style="font-size:13px;font-weight:600;color:var(--acc)">🔔 Enable Daily Reminders</div><div style="font-size:11px;color:var(--t2);margin-top:2px">Get notified for meals, gym, fasting window & logging</div></div>`;
}

// date nav (for browsing days)
h+=dateNav();

// rings
h+=`<div class="rings">`;
h+=ringCard("Calories",tc,TGT.cal,"kcal","var(--acc)",cp);
h+=ringCard("Protein",tp,TGT.pro,"g","var(--pur)",pp);
h+=ringCard("Water",d.water||0,TGT.water,"cups","var(--blu)",wp);
h+=`</div>`;

// quick actions
h+=`<div class="cd"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;color:var(--t2)">💧 Water (${d.water||0}/${TGT.water})</span><div style="display:flex;gap:6px">`;
if(isToday()){
  h+=`<button class="btn sm" onclick="updDay(d=>({...d,water:Math.max(0,(d.water||0)-1)}))">−</button><button class="btn sm ac" onclick="updDay(d=>({...d,water:(d.water||0)+1}))">+1</button>`;
}
h+=`</div></div></div>`;

// fasting mini
h+=`<div class="cd" onclick="go('fast')" style="cursor:pointer"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:13px;color:var(--t2)">⏱️ Fasting</div><div style="font-size:17px;font-weight:600;color:${S.fs?"var(--acc)":"var(--t3)"};margin-top:2px">${S.fs?(fd?"✅ Complete!":Math.floor(fr)+"h "+Math.floor((fr%1)*60)+"m left"):"Not started"}</div></div><span style="color:var(--t3);font-size:18px">›</span></div></div>`;

// meals mini
h+=`<div class="cd" onclick="go('meals')" style="cursor:pointer"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:13px;color:var(--t2)">🍽️ ${d.meals.length} meal${d.meals.length!==1?"s":""} logged</div><div style="font-size:12px;color:var(--t3);margin-top:2px">${tc} kcal · ${tp}g protein</div></div><span style="color:var(--t3);font-size:18px">›</span></div></div>`;

// workout mini
h+=`<div class="cd" onclick="go('gym')" style="cursor:pointer"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:13px;color:var(--t2)">💪 Workout</div>`;
if(d.wo){h+=`<div style="font-size:14px;font-weight:600;color:var(--acc);margin-top:2px">${WO[d.wo].title}</div><div style="font-size:11px;color:#444">${(d.cex||[]).length}/${WO[d.wo].ex.length} done</div>`}
else{h+=`<div style="color:var(--t4);font-size:12px;margin-top:2px">Not selected</div>`}
h+=`</div><span style="color:var(--t3);font-size:18px">›</span></div></div>`;

// steps
h+=`<div class="cd"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:13px;color:var(--t2)">👣 Steps</div><div style="font-size:20px;font-weight:700;color:#fff">${(d.steps||0).toLocaleString()}</div></div>`;
if(isToday()){h+=`<div style="display:flex;gap:5px">${[1000,2000,5000].map(n=>`<button class="btn sm" onclick="updDay(d=>({...d,steps:(d.steps||0)+${n}}))">+${n/1000}k</button>`).join("")}</div>`}
h+=`</div><div style="margin-top:6px"><div class="pb"><div class="pb-f" style="width:${sp}%;background:var(--yel)"></div></div><div style="font-size:10px;color:var(--t3);margin-top:3px">Goal: 7,000</div></div></div>`;

// weekly overview bars
h+=`<div class="cd"><div style="font-size:13px;font-weight:600;color:#fff;margin-bottom:10px">📊 Last 7 Days — Calories</div>`;
last7.forEach(day=>{
  const dd=day.data;
  const cal=dd?dd.meals.reduce((s,m)=>s+m.cal,0):0;
  const pct=clamp(cal/TGT.cal*100,0,120);
  const isT=day.date===todayS();
  h+=`<div class="wk-row"><div class="wk-label">${dayN(day.date)}</div><div class="wk-bar"><div class="wk-fill" style="width:${Math.min(pct,100)}%;background:${cal>TGT.cal?"var(--red)":cal>0?"var(--acc)":"#222"}"></div></div><div class="wk-val">${cal>0?cal+"":"-"}${isT?" •":""}</div></div>`;
});
h+=`</div>`;

// note
h+=`<div class="cd"><div style="font-size:13px;color:var(--t2);margin-bottom:6px">📝 Daily Note</div>`;
if(isToday()){
  h+=`<textarea class="inp" rows="2" placeholder="How are you feeling today?" oninput="updNote(this.value)" style="resize:none;font-size:13px">${d.note||""}</textarea>`;
}else{
  h+=`<div style="font-size:13px;color:${d.note?"#ccc":"var(--t4)"}">${d.note||"No note for this day"}</div>`;
}
h+=`</div>`;

h+=`</div>`; // end home

// ════════════════════ MEALS ════════════════════
h+=`<div class="tab ${S.tab==="meals"?"on":""} fade">`;
h+=dateNav();

h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
<div style="background:var(--card);border-radius:12px;padding:12px;text-align:center"><div style="font-size:26px;font-weight:700;color:${tc>TGT.cal?"var(--red)":"var(--acc)"}">${tc}</div><div style="font-size:10px;color:#444;text-transform:uppercase;letter-spacing:.8px">${TGT.cal-tc>0?TGT.cal-tc+" remaining":"Over!"}</div></div>
<div style="background:var(--card);border-radius:12px;padding:12px;text-align:center"><div style="font-size:26px;font-weight:700;color:${tp>=TGT.pro?"var(--acc)":"var(--pur)"}">${tp}g</div><div style="font-size:10px;color:#444;text-transform:uppercase;letter-spacing:.8px">${TGT.pro-tp>0?TGT.pro-tp+"g to go":"Hit! ✅"}</div></div></div>`;

h+=`<div class="ib tip" style="margin-top:0;margin-bottom:12px">🕐 Eating window: 12:00 PM – 8:00 PM</div>`;

[{k:"lunch",l:"🍽️ Lunch (12 PM) · ~500 kcal"},{k:"snack",l:"🥛 Snack (3:30 PM) · ~250 kcal"},{k:"dinner",l:"🍽️ Dinner (7 PM) · ~550 kcal"}].forEach(sec=>{
  h+=`<div class="sl">${sec.l}</div>`;
  MEALS[sec.k].forEach((m,i)=>{
    const lg=d.meals.some(x=>x.name===m.name);
    h+=`<div class="mi ${lg?"lg":""}" onclick="${isToday()?`togMeal('${sec.k}',${i})`:""}"><div style="display:flex;gap:10px;align-items:center"><span style="font-size:18px">${m.icon}</span><div><div style="font-size:13px;color:${lg?"var(--acc)":"#ddd"};font-weight:${lg?600:400}">${m.name}</div><div style="font-size:11px;color:#444;margin-top:1px">${m.cal} kcal · ${m.pro}g protein</div></div></div><div class="chk ${lg?"on":""}">${lg?"✓":""}</div></div>`;
  });
});

if(isToday()){
  if(!S.cmo){h+=`<button class="btn ac fl" style="margin-top:6px" onclick="S.cmo=true;R()">+ Custom Meal</button>`}
  else{
    h+=`<div class="cd" style="border-color:var(--acc3)"><div style="font-size:13px;font-weight:600;color:var(--acc);margin-bottom:8px">Custom Meal</div><input class="inp" placeholder="Name" id="cn" value="${S.cn}" oninput="S.cn=this.value" style="margin-bottom:6px"><div style="display:flex;gap:6px"><input class="inp" type="number" placeholder="Cal" id="cc" value="${S.cc}" oninput="S.cc=this.value"><input class="inp" type="number" placeholder="Protein g" id="cp" value="${S.cp}" oninput="S.cp=this.value"></div><div style="display:flex;gap:6px;margin-top:8px"><button class="btn" style="flex:1" onclick="S.cmo=false;S.cn='';S.cc='';S.cp='';R()">Cancel</button><button class="btn ac" style="flex:1" onclick="addCM()">Add</button></div></div>`;
  }
}
h+=`</div>`; // end meals

// ════════════════════ GYM ════════════════════
h+=`<div class="tab ${S.tab==="gym"?"on":""} fade">`;
h+=dateNav();

h+=`<div style="display:flex;gap:8px;margin-bottom:14px">`;
["A","B","C"].forEach(w=>{
  h+=`<div style="flex:1;padding:11px 6px;border-radius:10px;text-align:center;cursor:pointer;background:${d.wo===w?"var(--acc2)":"var(--card)"};border:1px solid ${d.wo===w?"var(--acc3)":"var(--brd)"};transition:.12s" onclick="${isToday()?`selWO('${w}')`:""}"><div style="font-size:15px;font-weight:700;color:${d.wo===w?"var(--acc)":"var(--t3)"}">Day ${w}</div><div style="font-size:9px;color:#444;margin-top:1px">${w==="A"?"Lower":w==="B"?"Upper":"Full+HIIT"}</div></div>`;
});
h+=`</div>`;

if(d.wo){
  const wo=WO[d.wo];
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="font-size:15px;font-weight:600;color:#fff">${wo.title}</div><div style="font-size:12px;color:var(--red)">🔥 ~${wo.burn} kcal</div></div>`;
  wo.ex.forEach((e,i)=>{
    const dn=(d.cex||[]).includes(i);
    h+=`<div class="ei ${dn?"dn":""}" onclick="${isToday()?`togEx(${i})`:""}"><div><div style="font-size:13px;color:${dn?"var(--acc)":"#ddd"};text-decoration:${dn?"line-through":"none"};font-weight:500">${e.n}</div><div style="font-size:11px;color:#444;margin-top:1px">${e.s}</div></div><div class="chk ${dn?"on":""}">${dn?"✓":""}</div></div>`;
  });
  const ep=(d.cex||[]).length/wo.ex.length*100;
  h+=`<div style="margin-top:10px"><div class="pb"><div class="pb-f" style="width:${ep}%;background:var(--acc)"></div></div><div style="font-size:11px;color:var(--t3);margin-top:5px;text-align:center">${(d.cex||[]).length}/${wo.ex.length}${ep>=100?" — 🎉 Done!":""}</div></div>`;
}else{h+=`<div style="text-align:center;padding:36px;color:var(--t4)"><div style="font-size:36px;margin-bottom:10px">🏋️</div><div style="font-size:13px">Pick a workout above</div></div>`}

h+=`<div class="ib tip">💡 Rest 60–90s between sets. Start moderate. Increase weight ~5% every 1–2 weeks.</div>`;
h+=`</div>`; // end gym

// ════════════════════ FASTING ════════════════════
h+=`<div class="tab ${S.tab==="fast"?"on":""} fade">`;
h+=`<div style="text-align:center;padding:16px 0"><div style="position:relative;width:190px;height:190px;margin:0 auto">${ring(fpct,fd?"var(--acc)":"#64ffda80",190,10)}<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">`;
if(S.fs){
  if(fd){h+=`<div style="font-size:30px;margin-bottom:4px">🎉</div><div style="font-size:17px;font-weight:700;color:var(--acc)">Complete!</div><div style="font-size:11px;color:#444">16h done</div>`}
  else{h+=`<div style="font-size:34px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums">${Math.floor(fr)}:${String(Math.floor((fr%1)*60)).padStart(2,"0")}</div><div style="font-size:11px;color:#555;margin-top:3px">hours left</div><div style="font-size:12px;color:var(--acc);margin-top:6px">${Math.floor(fe*60)} min elapsed</div>`}
}else{h+=`<div style="font-size:30px;margin-bottom:4px">⏱️</div><div style="font-size:13px;color:#444">Ready</div>`}
h+=`</div></div>`;
h+=`<div style="margin-top:20px;display:flex;gap:10px;justify-content:center">`;
if(!S.fs){h+=`<button class="btn ac" onclick="startF()">Start 16h Fast</button>`}
else{h+=`<button class="btn" onclick="resetF()">Reset</button>`}
h+=`</div>`;
if(S.fs){const st=new Date(S.fs).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}),en=new Date(S.fs+16*36e5).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});h+=`<div style="margin-top:14px;font-size:12px;color:#444">${st} → ${en}</div>`}
h+=`</div>`;

h+=`<div class="cd"><div style="font-size:13px;font-weight:600;color:#fff;margin-bottom:8px">Fasting Phases</div>`;
[{h:"0-4h",n:"Fed → Fasting",d:"Digesting last meal",i:"🍽️",s:0},{h:"4-8h",n:"Early Fasting",d:"Insulin drops",i:"📉",s:4},{h:"8-12h",n:"Fat Burning",d:"Using fat stores",i:"🔥",s:8},{h:"12-16h",n:"Deep Ketosis",d:"Peak fat oxidation",i:"⚡",s:12}].forEach((p,i)=>{
  const a=S.fs&&fe>=p.s;
  h+=`<div style="display:flex;gap:10px;align-items:center;padding:7px 0;${i<3?"border-bottom:1px solid #ffffff06":""};opacity:${a?1:.3}"><span style="font-size:16px">${p.i}</span><div><div style="font-size:12px;color:#ddd;font-weight:500">${p.h} — ${p.n}</div><div style="font-size:11px;color:#444">${p.d}</div></div></div>`;
});
h+=`</div><div class="ib ok">✅ Allowed: water, black coffee, green tea. No sugar, no milk.</div>`;
h+=`</div>`; // end fast

// ════════════════════ PROGRESS ════════════════════
h+=`<div class="tab ${S.tab==="progress"?"on":""} fade">`;

const wl=S.wl;
const cw=wl.length>0?wl[wl.length-1].weight:SW;
const lost=SW-cw;
const gp=clamp(lost/(SW-GW)*100,0,100);

h+=`<div class="cd"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:13px;color:var(--t2)">Goal: ${SW} → ${GW} kg</div><div style="font-size:14px;font-weight:700;color:var(--acc)">${cw} kg</div></div><div class="pb"><div class="pb-f" style="width:${gp}%;background:var(--acc)"></div></div><div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--t3)"><span>${lost>0?lost.toFixed(1)+" kg lost":"Starting"}</span><span>${Math.max(0,cw-GW).toFixed(1)} kg to go</span></div></div>`;

h+=`<div class="cd"><div style="font-size:13px;color:var(--t2);margin-bottom:8px">⚖️ Log weight</div><div style="display:flex;gap:8px"><input class="inp" type="number" step="0.1" placeholder="e.g. 65.4" id="wi" value="${S.wi}" oninput="S.wi=this.value"><button class="btn ac" onclick="addW()">Log</button></div><div style="font-size:10px;color:var(--t3);margin-top:5px">Once per week, same morning, before eating.</div></div>`;

// chart
if(wl.length>1){
  h+=`<div class="cd"><div style="font-size:13px;color:var(--t2);margin-bottom:10px">📉 Trend</div>`;
  const cW=300,cH=110;
  const aw=wl.map(w=>w.weight);
  const mn=Math.min(GW-1,...aw),mx=Math.max(SW+1,...aw),rg=mx-mn||1;
  const gy=cH-((GW-mn)/rg)*cH;
  let pts=wl.map((w,i)=>{const x=20+(i/Math.max(1,wl.length-1))*(cW-40);const y=cH-((w.weight-mn)/rg)*cH;return{x,y,w:w.weight,d:w.date}});
  h+=`<svg width="${cW}" height="${cH+20}" style="display:block;width:100%;max-width:${cW}px">`;
  h+=`<line x1="0" y1="${gy}" x2="${cW}" y2="${gy}" stroke="#64ffda20" stroke-dasharray="4,4"/><text x="3" y="${gy-3}" fill="#64ffda35" font-size="7">${GW}kg</text>`;
  h+=`<polyline fill="none" stroke="var(--acc)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="${pts.map(p=>`${p.x},${p.y}`).join(" ")}"/>`;
  pts.forEach(p=>{h+=`<circle cx="${p.x}" cy="${p.y}" r="3" fill="var(--acc)"/><text x="${p.x}" y="${p.y-6}" text-anchor="middle" fill="#888" font-size="7">${p.w}</text><text x="${p.x}" y="${cH+12}" text-anchor="middle" fill="#333" font-size="6">${p.d.slice(5)}</text>`});
  h+=`</svg></div>`;
}

// streak
h+=`<div class="cd"><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-size:13px;color:var(--t2)">🔥 Current Streak</div><div style="font-size:20px;font-weight:700;color:var(--org)">${streak} day${streak!==1?"s":""}</div></div><div class="streak-bar">`;
last7.forEach(day=>{
  const dd=day.data;
  const active=dd&&(dd.meals.length>0||dd.wo||dd.water>0);
  h+=`<div class="streak-d" style="background:${active?"var(--acc)":"#1a1a1a"};color:${active?"#000":"#333"}">${dayN(day.date).charAt(0)}</div>`;
});
h+=`</div></div>`;

// history
h+=`<div class="cd"><div style="font-size:13px;color:var(--t2);margin-bottom:6px">📋 Weight Log</div>`;
if(wl.length===0){h+=`<div style="color:var(--t4);font-size:13px">No entries yet.</div>`}
[...wl].reverse().forEach(w=>{h+=`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #ffffff06;font-size:13px"><span style="color:var(--t2)">${dayN(w.date)} ${w.date}</span><span style="color:#fff;font-weight:600">${w.weight} kg</span></div>`});
h+=`</div>`;

if(wl.length>0){h+=`<button class="btn dn fl" onclick="resetAll()">Reset All Data</button>`}
h+=`</div>`; // end progress

// ════════════════════ PLAN ════════════════════
h+=`<div class="tab ${S.tab==="plan"?"on":""} fade">`;

h+=`<div class="cd"><div style="font-size:14px;font-weight:600;color:#fff;margin-bottom:6px">Week A — Coworking 2 Days</div>`;
h+=schG(["🏋️","🏢","🏋️","🏢","🏋️","🚶‍♀️","😴"],["Gym A","Cowork","Gym B","Cowork","Gym C","Active","Rest"],["var(--acc)","var(--pur)","var(--acc)","var(--pur)","var(--acc)","#333","#222"]);
h+=`</div>`;

h+=`<div class="cd"><div style="font-size:14px;font-weight:600;color:#fff;margin-bottom:6px">Week B — Coworking 3 Days</div>`;
h+=schG(["🏢","🏋️","🏢","🏋️","🏢","🏋️","😴"],["Cowork","Gym A","Cowork","Gym B","Cowork","Gym C","Rest"],["var(--pur)","var(--acc)","var(--pur)","var(--acc)","var(--pur)","var(--acc)","#222"]);
h+=`</div>`;

h+=`<div class="cd"><div style="font-size:14px;font-weight:600;color:#fff;margin-bottom:8px">📊 Daily Targets</div><div style="font-size:13px;color:var(--t2);line-height:2.2">🎯 Calories: <strong style="color:var(--acc)">1,400 kcal</strong><br>🥩 Protein: <strong style="color:var(--pur)">105g</strong> (1.6g/kg)<br>🕐 Window: <strong style="color:#fff">12 PM – 8 PM</strong><br>💧 Water: <strong style="color:var(--blu)">8 cups (2L)</strong><br>👣 Steps: <strong style="color:var(--yel)">7,000+</strong><br>😴 Sleep: <strong style="color:#fff">7–8 hours</strong></div></div>`;

h+=`<div class="cd"><div style="font-size:14px;font-weight:600;color:#fff;margin-bottom:8px">⚡ Rules</div><div style="font-size:13px;color:var(--t2);line-height:2.2">1. <strong style="color:#fff">Protein first</strong> every meal<br>2. <strong style="color:#fff">No liquid calories</strong><br>3. <strong style="color:#fff">Eat at the table</strong>, not your desk<br>4. <strong style="color:#fff">Gym 3×/week</strong> — it's in your building!<br>5. <strong style="color:#fff">Sleep 7+ hours</strong><br>6. <strong style="color:#fff">2L+ water</strong> daily<br>7. <strong style="color:#fff">Weigh once/week only</strong><br>8. <strong style="color:#fff">Nothing after 8 PM</strong></div></div>`;

h+=`</div>`; // end plan

h+=`</div>`; // end content

// nav
const navs=[{id:"home",i:"🏠",l:"Today"},{id:"meals",i:"🍽️",l:"Meals"},{id:"gym",i:"💪",l:"Gym"},{id:"fast",i:"⏱️",l:"Fast"},{id:"progress",i:"📈",l:"Progress"},{id:"plan",i:"📅",l:"Plan"}];
h+=`<div class="nav">${navs.map(n=>`<div class="ni ${S.tab===n.id?"on":""}" onclick="go('${n.id}')"><div class="ni-i">${n.i}</div><div class="ni-l">${n.l}</div></div>`).join("")}</div>`;

document.getElementById("app").innerHTML=h;
}

function dateNav(){
  const vd=new Date(S.vd+"T12:00:00");
  const td=todayS();
  const canFwd=S.vd<td;
  return`<div class="dnav"><button class="dnav-btn" onclick="navDay(-1)">‹</button><div class="dnav-date"><div class="dnav-day">${fmtDate(S.vd)}${S.vd===td?'<span class="today-dot"></span>':""}</div><div class="dnav-sub">${S.vd===td?"Today":S.vd}</div></div><button class="dnav-btn ${canFwd?"":"dis"}" onclick="navDay(1)">›</button></div>`;
}

function ringCard(l,v,mx,u,c,p){
  return`<div class="ring-c"><div style="position:relative;width:48px;height:48px;margin:0 auto 5px">${ring(p,c,48,4)}<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:${c}">${Math.round(p)}%</div></div><div style="font-size:14px;font-weight:700;color:#fff">${v}</div><div style="font-size:8px;color:var(--t3);letter-spacing:.4px;margin-top:1px">${l}</div></div>`;
}

function schG(icons,labels,colors){
  const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  let h=`<div class="sch">`;
  days.forEach((d,i)=>{h+=`<div class="sch-c" style="border-bottom-color:${colors[i]}"><div class="sd">${d}</div><div class="si">${icons[i]}</div><div class="sf">${labels[i]}</div></div>`});
  return h+`</div>`;
}

// ═══════════════════════ ACTIONS ═══════════════════════
function go(t){S.tab=t;R();window.scrollTo(0,0)}

function navDay(dir){
  const d=new Date(S.vd+"T12:00:00");
  d.setDate(d.getDate()+dir);
  const ns=d.toISOString().slice(0,10);
  if(ns>todayS())return;
  S.vd=ns;S.day=loadDay(ns);R();
}

function togMeal(sec,i){
  if(!isToday())return;
  const m=MEALS[sec][i];
  updDay(d=>{const ix=d.meals.findIndex(x=>x.name===m.name);return ix>=0?{...d,meals:d.meals.filter((_,j)=>j!==ix)}:{...d,meals:[...d.meals,{...m}]}});
}

function addCM(){
  if(!S.cn||!S.cc)return;
  updDay(d=>({...d,meals:[...d.meals,{name:S.cn,cal:parseInt(S.cc),pro:parseInt(S.cp)||0,icon:"🍴"}]}));
  S.cmo=false;S.cn="";S.cc="";S.cp="";
}

function selWO(w){if(!isToday())return;updDay(d=>({...d,wo:w,cex:[]}))}
function togEx(i){if(!isToday())return;updDay(d=>{const a=d.cex||[];return{...d,cex:a.includes(i)?a.filter(x=>x!==i):[...a,i]}})}

function startF(){S.fs=Date.now();sv("fs",S.fs);R()}
function resetF(){S.fs=null;sv("fs",null);R()}

function addW(){
  const v=parseFloat(S.wi);if(!v||v<30||v>200)return;
  const e={date:todayS(),weight:v};
  S.wl=[...S.wl.filter(w=>w.date!==todayS()),e].sort((a,b)=>a.date.localeCompare(b.date));
  sv("wl",S.wl);S.wi="";R();
}

function updNote(v){S.day.note=v;saveDay(S.vd,S.day)}

function resetAll(){if(confirm("Reset ALL data? Cannot be undone.")){
  Object.keys(localStorage).forEach(k=>{if(k.startsWith(P))localStorage.removeItem(k)});
  S.wl=[];S.day=emptyDay();S.fs=null;S.wi="";R();
}}

// ═══════════════════════ INIT ═══════════════════════
R();
if(S.notifEnabled)scheduleNotifs();
setInterval(()=>{if(S.fs&&(S.tab==="fast"||S.tab==="home"))R()},1000);
setInterval(()=>{if(S.vd===todayS())return;/* auto-refresh if left open overnight */S.vd=todayS();S.day=loadDay(todayS());R()},60000);
</script>
</body>
